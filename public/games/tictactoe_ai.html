<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>井字棋AI</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;color:#fff}
.game{text-align:center}.board{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:240px;margin:12px auto}
.cell{width:76px;height:76px;background:#1a1a2e;border:2px solid #363a5a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;cursor:pointer;transition:.15s}
.cell:hover{background:#2a2d4a}.cell.x{color:#e74c3c}.cell.o{color:#3498db}
.info{font-size:13px;color:#9898b8;margin:8px}.controls button{padding:6px 16px;border:none;border-radius:4px;cursor:pointer;background:#6c5ce7;color:#fff;font-size:13px}
</style></head>
<body><div class="game">
<div class="info" id="status">你的回合 (X)</div>
<div id="board" class="board"></div>
<div class="controls"><button onclick="initGame()">新游戏</button></div>
</div>
<script>
let board, playerTurn, gameOver;
const WIN=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function initGame(){board=Array(9).fill(null);playerTurn=true;gameOver=false;document.getElementById('status').textContent='你的回合 (X)';render()}
function checkWin(b,p){for(const[a,bc,c]of WIN)if(b[a]===p&&b[bc]===p&&b[c]===p)return true;return false}
function isFull(b){return b.every(v=>v!==null)}
function minimax(b,depth,isMax){if(checkWin(b,'O'))return 10-depth;if(checkWin(b,'X'))return depth-10;if(isFull(b))return 0;if(isMax){let best=-Infinity;for(let i=0;i<9;i++){if(b[i]!==null)continue;b[i]='O';best=Math.max(best,minimax(b,depth+1,false));b[i]=null}return best}else{let best=Infinity;for(let i=0;i<9;i++){if(b[i]!==null)continue;b[i]='X';best=Math.min(best,minimax(b,depth+1,true));b[i]=null}return best}}
function aiMove(){let best=-Infinity,bestIdx=-1;for(let i=0;i<9;i++){if(board[i]!==null)continue;board[i]='O';const val=minimax(board,0,false);board[i]=null;if(val>best){best=val;bestIdx=i}}return bestIdx}
function handleClick(idx){if(gameOver||!playerTurn||board[idx])return;board[idx]='X';render();if(checkWin(board,'X')){document.getElementById('status').textContent='🎉 你赢了!';gameOver=true;return}if(isFull(board)){document.getElementById('status').textContent='🤝 平局!';gameOver=true;return}playerTurn=false;document.getElementById('status').textContent='AI思考中...';setTimeout(()=>{const ai=aiMove();if(ai===-1){document.getElementById('status').textContent='🤝 平局!';gameOver=true;render();return}board[ai]='O';render();if(checkWin(board,'O')){document.getElementById('status').textContent='😞 AI赢了';gameOver=true}else if(isFull(board)){document.getElementById('status').textContent='🤝 平局!';gameOver=true}else{document.getElementById('status').textContent='你的回合 (X)';playerTurn=true}},300)}
function render(){const b=document.getElementById('board');b.innerHTML='';board.forEach((v,i)=>{const d=document.createElement('div');d.className='cell'+(v==='X'?' x':v==='O'?' o':'');d.textContent=v||'';d.onclick=()=>handleClick(i);b.appendChild(d)})}
initGame();
</script>
</body></html>
