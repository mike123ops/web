<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>数独</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;color:#fff}
.game{text-align:center}.board{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;width:280px;margin:12px auto;background:rgba(255,255,255,.1);padding:2px;border-radius:6px}
.cell{height:30px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border:1px solid transparent}
.cell.br{border-right:2px solid #6c5ce7}.cell.bb{border-bottom:2px solid #6c5ce7}.cell.given{color:#a29bfe;font-weight:bold}.cell.selected{background:#6c5ce7!important;color:#fff}.cell.input{color:#fff}.info{font-size:13px;color:#9898b8;margin:8px}
.controls button{padding:4px 10px;margin:2px;border:none;border-radius:4px;cursor:pointer;background:#6c5ce7;color:#fff;font-size:12px}
.numpad{display:flex;gap:4px;justify-content:center;margin:8px}.numpad button{width:28px;height:28px;background:#2a2d4a;border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:14px}.numpad button:hover{background:#6c5ce7}
</style></head>
<body><div class="game">
<div class="info">点击格子，再点数字填入</div>
<div id="board" class="board"></div>
<div class="numpad" id="numpad"></div>
<div class="controls"><button onclick="initGame()">新游戏</button></div>
</div>
<script>
let grid,given,selected=null;
const PUZZLES=['530070000600195000098000060800060003400803001700020006060000280000419005000080079','020000600000007003400009100002000700500040008003000900006100002700200000004000060','100007090030020008009600500005300900010080002600004000300000010040000007007000300'];
function initGame(){const p=PUZZLES[Math.floor(Math.random()*PUZZLES.length)];grid=[];given=[];selected=null;for(let r=0;r<9;r++){grid[r]=[];given[r]=[];for(let c=0;c<9;c++){const v=parseInt(p[r*9+c])||0;grid[r][c]=v;given[r][c]=!!v}}render()}
function isValid(board,r,c,num){if(!num)return true;for(let i=0;i<9;i++){if(board[r][i]===num)return false;if(board[i][c]===num)return false}const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;for(let i=br;i<br+3;i++)for(let j=bc;j<bc+3;j++)if(board[i][j]===num)return false;return true}
function checkWin(){for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(!grid[r][c]||!isValid(grid,r,c,grid[r][c]))return false;return true}
function render(){const b=document.getElementById('board');b.innerHTML='';for(let r=0;r<9;r++)for(let c=0;c<9;c++){const d=document.createElement('div');d.className='cell';if((c+1)%3===0&&c!==8)d.classList.add('br');if((r+1)%3===0&&r!==8)d.classList.add('bb');if(given[r][c]){d.textContent=grid[r][c];d.classList.add('given')}else if(grid[r][c]){d.textContent=grid[r][c];d.classList.add('input')}if(selected&&selected[0]===r&&selected[1]===c)d.classList.add('selected');d.onclick=()=>{selected=[r,c];render()};b.appendChild(d)}if(checkWin())setTimeout(()=>alert('🎉 恭喜完成!'),100)}
const np=document.getElementById('numpad');for(let n=1;n<=9;n++){const btn=document.createElement('button');btn.textContent=n;btn.onclick=()=>{if(!selected)return;const[r,c]=selected;if(given[r][c])return;grid[r][c]=grid[r][c]===n?0:n;render()};np.appendChild(btn)}
initGame();
</script>
</body></html>
