<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>恐龙跑酷</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;color:#fff}
.game{text-align:center}canvas{background:#1a1a2e;border-radius:8px;display:block}
.info{font-size:13px;color:#9898b8;margin:8px}.controls button{padding:6px 16px;border:none;border-radius:4px;cursor:pointer;background:#6c5ce7;color:#fff;font-size:13px}
</style></head>
<body><div class="game">
<div class="info">🦖 按空格跳跃 | 分数: <b id="score">0</b></div>
<canvas id="c" width="500" height="200"></canvas>
<div class="controls"><button onclick="initGame()">重新开始</button></div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let dino,obstacles,score,gameOver,speed,timer,groundY=170;

function initGame(){
    dino={x:50,y:groundY-30,w:25,h:30,vy:0,jumping:false};
    obstacles=[];score=0;gameOver=false;speed=5;
    document.getElementById('score').textContent='0';
    if(timer)clearInterval(timer);timer=setInterval(update,20)
}

function jump(){
    if(gameOver){initGame();return}
    if(!dino.jumping&&dino.y>=groundY-30){dino.vy=-9;dino.jumping=true}
}

function update(){
    dino.vy+=.5;dino.y+=dino.vy;
    if(dino.y>=groundY-30){dino.y=groundY-30;dino.vy=0;dino.jumping=false}

    if(obstacles.length===0||obstacles[obstacles.length-1].x<400){
        if(Math.random()<.02)obstacles.push({x:500,w:15+Math.random()*20,h:25+Math.random()*15,y:groundY})
    }
    for(let i=obstacles.length-1;i>=0;i--){
        obstacles[i].x-=speed;
        if(obstacles[i].x<-50)obstacles.splice(i,1);else if(!obstacles[i].scored&&obstacles[i].x+obstacles[i].w<dino.x){score++;document.getElementById('score').textContent=score;obstacles[i].scored=true;speed=5+Math.floor(score/5)}
    }

    // 碰撞
    for(const o of obstacles){
        if(dino.x+dino.w>o.x&&dino.x<o.x+o.w&&dino.y+dino.h>o.y-o.h&&dino.y<o.y){gameOver=true;clearInterval(timer);break}
    }
    draw()
}

function draw(){
    ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,500,200);
    ctx.strokeStyle='#4a4a6a';ctx.beginPath();ctx.moveTo(0,groundY);ctx.lineTo(500,groundY);ctx.stroke();

    // 恐龙
    ctx.fillStyle='#2ecc71';
    ctx.fillRect(dino.x,dino.y,dino.w,dino.h);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(dino.x+18,dino.y+8,4,0,2*Math.PI);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(dino.x+19,dino.y+7,2,0,2*Math.PI);ctx.fill();

    for(const o of obstacles){
        ctx.fillStyle='#e74c3c';ctx.fillRect(o.x,o.y-o.h,o.w,o.h);
    }

    if(gameOver){
        ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,500,200);
        ctx.fillStyle='#fff';ctx.font='20px sans-serif';ctx.textAlign='center';
        ctx.fillText('游戏结束',250,80);
        ctx.font='14px sans-serif';ctx.fillText('分数: '+score,250,110);
    }
}

document.onkeydown=e=>{if(e.key===' '||e.key==='Space'||e.key==='ArrowUp'){e.preventDefault();jump()}};
initGame();
</script>
</body></html>
